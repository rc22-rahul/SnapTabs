<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Vault body -->
  <rect x="16" y="28" width="96" height="80" rx="12" fill="#1e293b" stroke="#60a5fa" stroke-width="4"/>
  <!-- Vault door circle -->
  <circle cx="64" cy="68" r="24" stroke="#60a5fa" stroke-width="3" fill="none"/>
  <!-- Vault handle -->
  <line x1="64" y1="50" x2="64" y2="68" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="68" x2="80" y2="68" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Tab indicators on top -->
  <rect x="24" y="18" width="28" height="14" rx="4" fill="#3b82f6"/>
  <rect x="56" y="18" width="28" height="14" rx="4" fill="#2563eb"/>
  <rect x="88" y="18" width="20" height="14" rx="4" fill="#1d4ed8"/>
  <!-- Lock keyhole -->
  <circle cx="64" cy="66" r="4" fill="#60a5fa"/>
  <rect x="62" y="66" width="4" height="10" rx="1" fill="#60a5fa"/>
</svg>
